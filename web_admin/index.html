<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互助系统 - 管理终端</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css?v=2026">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="glass-panel login-box">
            <div class="logo-area">
                <div class="logo-icon">✨</div>
                <h2>Campus Admin</h2>
                <p>校园互助运营管理台</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label>管理账号</label>
                    <input type="text" id="username" placeholder="请输入超级管理员账号" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>安全密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
                        <button type="button" class="eye-btn" id="togglePassword" title="显示/隐藏密码">
                            <!-- 闭眼图标（默认：密码隐藏中） -->
                            <svg id="eyeClose" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                            <!-- 睁眼图标（密码可见时显示） -->
                            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="error-msg" id="loginError"></div>
                <button type="submit" class="btn-primary login-btn" id="submitBtn">登录认证</button>
            </form>
        </div>
    </div>
    
    <script src="js/api.js?v=2026-v2"></script>
    <script src="js/auth.js?v=2026-v2"></script>
    <script>
        // 小眼睛切换密码可见性
        document.getElementById('togglePassword').addEventListener('click', function () {
            const pwdInput = document.getElementById('password');
            const eyeClose = document.getElementById('eyeClose');
            const eyeOpen  = document.getElementById('eyeOpen');
            const isHidden = pwdInput.type === 'password';
            pwdInput.type  = isHidden ? 'text' : 'password';
            eyeClose.style.display = isHidden ? 'none'  : '';
            eyeOpen.style.display  = isHidden ? ''      : 'none';
        });
    </script>
</body>
</html>
